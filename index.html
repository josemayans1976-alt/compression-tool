<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Self-Extracting Archive Creator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('compression-logo.jpg') center center no-repeat;
      background-size: 60%;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
    }

    .drop-zone {
      border: 3px dashed #4a4a6a;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      transition: all 0.3s ease;
      background: #252542;
      cursor: pointer;
    }

    .drop-zone.dragover {
      border-color: #6c63ff;
      background: #2d2d52;
      transform: scale(1.02);
    }

    .drop-zone-text {
      font-size: 18px;
      color: #888;
    }

    .drop-zone-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .file-list {
      margin-top: 20px;
      background: #252542;
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .file-list:empty {
      display: none;
    }

    .file-item {
      padding: 10px 15px;
      border-bottom: 1px solid #3a3a5a;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-path {
      color: #aaa;
      word-break: break-all;
    }

    .file-size {
      color: #6c63ff;
      white-space: nowrap;
      margin-left: 15px;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 12px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #6c63ff;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #5a52d5;
    }

    .btn-secondary {
      background: #4a4a6a;
      color: white;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #5a5a7a;
    }

    select {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #3a3a5a;
      color: white;
      cursor: pointer;
    }

    select:focus {
      outline: 2px solid #6c63ff;
    }

    .progress-container {
      margin-top: 20px;
      display: none;
    }

    .progress-container.active {
      display: block;
    }

    .progress-bar {
      height: 8px;
      background: #3a3a5a;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #6c63ff;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #888;
    }

    .stats {
      margin-top: 20px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Self-Extracting Archive Creator</h1>

    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">📁</div>
      <div class="drop-zone-text">Drop files or folders here</div>
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="stats" id="stats"></div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">Processing...</div>
    </div>

    <div class="actions">
      <button class="btn-secondary" id="clearBtn" disabled>Clear</button>
      <select id="platformSelect">
        <option value="mac">macOS (.command)</option>
        <option value="linux">Linux (.sh + xz)</option>
        <option value="windows">Windows (.ps1)</option>
        <option value="zip">ZIP file (universal)</option>
      </select>
      <button class="btn-primary" id="generateBtn" disabled>Generate</button>
    </div>
  </div>

  <script>
    // ============================================
    // DEFLATE Compression Implementation (Pure JS)
    // ============================================

    const Deflate = (() => {
      // Fixed Huffman tables for DEFLATE
      const LENGTH_CODES = [
        [0, 3], [0, 4], [0, 5], [0, 6], [0, 7], [0, 8], [0, 9], [0, 10],
        [1, 11], [1, 13], [1, 15], [1, 17], [2, 19], [2, 23], [2, 27], [2, 31],
        [3, 35], [3, 43], [3, 51], [3, 59], [4, 67], [4, 83], [4, 99], [4, 115],
        [5, 131], [5, 163], [5, 195], [5, 227], [0, 258]
      ];

      const DIST_CODES = [
        [0, 1], [0, 2], [0, 3], [0, 4], [1, 5], [1, 7], [2, 9], [2, 13],
        [3, 17], [3, 25], [4, 33], [4, 49], [5, 65], [5, 97], [6, 129], [6, 193],
        [7, 257], [7, 385], [8, 513], [8, 769], [9, 1025], [9, 1537],
        [10, 2049], [10, 3073], [11, 4097], [11, 6145], [12, 8193], [12, 12289],
        [13, 16385], [13, 24577]
      ];

      class BitWriter {
        constructor() {
          this.buffer = [];
          this.bitBuffer = 0;
          this.bitCount = 0;
        }

        writeBits(value, count) {
          this.bitBuffer |= (value << this.bitCount);
          this.bitCount += count;
          while (this.bitCount >= 8) {
            this.buffer.push(this.bitBuffer & 0xff);
            this.bitBuffer >>= 8;
            this.bitCount -= 8;
          }
        }

        finish() {
          if (this.bitCount > 0) {
            this.buffer.push(this.bitBuffer & 0xff);
          }
          return new Uint8Array(this.buffer);
        }
      }

      function findLengthCode(length) {
        for (let i = LENGTH_CODES.length - 1; i >= 0; i--) {
          if (length >= LENGTH_CODES[i][1]) return i;
        }
        return 0;
      }

      function findDistCode(dist) {
        for (let i = DIST_CODES.length - 1; i >= 0; i--) {
          if (dist >= DIST_CODES[i][1]) return i;
        }
        return 0;
      }

      // Fixed Huffman code lengths
      function getFixedLitLenCode(symbol) {
        if (symbol <= 143) return { code: 0x30 + symbol, bits: 8 };
        if (symbol <= 255) return { code: 0x190 + (symbol - 144), bits: 9 };
        if (symbol <= 279) return { code: symbol - 256, bits: 7 };
        return { code: 0xc0 + (symbol - 280), bits: 8 };
      }

      function reverseBits(value, bits) {
        let result = 0;
        for (let i = 0; i < bits; i++) {
          result = (result << 1) | (value & 1);
          value >>= 1;
        }
        return result;
      }

      function compress(data) {
        const writer = new BitWriter();

        // BFINAL = 1, BTYPE = 01 (fixed Huffman)
        writer.writeBits(1, 1); // final block
        writer.writeBits(1, 2); // fixed Huffman

        // Simple LZ77 with hash table
        const WINDOW_SIZE = 32768;
        const MIN_MATCH = 3;
        const MAX_MATCH = 258;
        const hashTable = new Map();

        function getHash(data, pos) {
          if (pos + 2 >= data.length) return -1;
          return (data[pos] << 16) | (data[pos + 1] << 8) | data[pos + 2];
        }

        let pos = 0;
        while (pos < data.length) {
          const hash = getHash(data, pos);
          let bestLen = 0;
          let bestDist = 0;

          if (hash !== -1 && hashTable.has(hash)) {
            const positions = hashTable.get(hash);
            for (let i = positions.length - 1; i >= 0 && positions[i] >= pos - WINDOW_SIZE; i--) {
              const matchPos = positions[i];
              const dist = pos - matchPos;
              if (dist > WINDOW_SIZE || dist <= 0) continue;

              let len = 0;
              while (len < MAX_MATCH && pos + len < data.length &&
                     data[matchPos + len] === data[pos + len]) {
                len++;
              }

              if (len >= MIN_MATCH && len > bestLen) {
                bestLen = len;
                bestDist = dist;
              }
            }
          }

          if (bestLen >= MIN_MATCH) {
            // Encode length
            const lenIdx = findLengthCode(bestLen);
            const lenCode = 257 + lenIdx;
            const { code: litCode, bits: litBits } = getFixedLitLenCode(lenCode);
            writer.writeBits(reverseBits(litCode, litBits), litBits);

            const [extraLenBits, baseLen] = LENGTH_CODES[lenIdx];
            if (extraLenBits > 0) {
              writer.writeBits(bestLen - baseLen, extraLenBits);
            }

            // Encode distance
            const distIdx = findDistCode(bestDist);
            writer.writeBits(reverseBits(distIdx, 5), 5);
            const [extraDistBits, baseDist] = DIST_CODES[distIdx];
            if (extraDistBits > 0) {
              writer.writeBits(bestDist - baseDist, extraDistBits);
            }

            // Update hash table for all positions in match
            for (let i = 0; i < bestLen; i++) {
              const h = getHash(data, pos + i);
              if (h !== -1) {
                if (!hashTable.has(h)) hashTable.set(h, []);
                hashTable.get(h).push(pos + i);
              }
            }
            pos += bestLen;
          } else {
            // Literal
            const byte = data[pos];
            const { code, bits } = getFixedLitLenCode(byte);
            writer.writeBits(reverseBits(code, bits), bits);

            if (hash !== -1) {
              if (!hashTable.has(hash)) hashTable.set(hash, []);
              hashTable.get(hash).push(pos);
            }
            pos++;
          }
        }

        // End of block
        const { code: endCode, bits: endBits } = getFixedLitLenCode(256);
        writer.writeBits(reverseBits(endCode, endBits), endBits);

        return writer.finish();
      }

      return { compress };
    })();

    // ============================================
    // Gzip Wrapper
    // ============================================

    function gzipCompress(data) {
      const compressed = Deflate.compress(data);

      // Calculate CRC32
      const crc = crc32(data);

      // Gzip header
      const header = new Uint8Array([
        0x1f, 0x8b, // Magic number
        0x08,       // Compression method (DEFLATE)
        0x00,       // Flags
        0x00, 0x00, 0x00, 0x00, // Modification time
        0x00,       // Extra flags
        0xff        // OS (unknown)
      ]);

      // Gzip footer (CRC32 + original size)
      const footer = new Uint8Array(8);
      const view = new DataView(footer.buffer);
      view.setUint32(0, crc, true);
      view.setUint32(4, data.length, true);

      // Combine
      const result = new Uint8Array(header.length + compressed.length + footer.length);
      result.set(header, 0);
      result.set(compressed, header.length);
      result.set(footer, header.length + compressed.length);

      return result;
    }

    function crc32(data) {
      let crc = 0xffffffff;
      const table = crc32Table();
      for (let i = 0; i < data.length; i++) {
        crc = (crc >>> 8) ^ table[(crc ^ data[i]) & 0xff];
      }
      return (crc ^ 0xffffffff) >>> 0;
    }

    const crc32Table = (() => {
      let table = null;
      return () => {
        if (table) return table;
        table = new Uint32Array(256);
        for (let i = 0; i < 256; i++) {
          let c = i;
          for (let j = 0; j < 8; j++) {
            c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
          }
          table[i] = c;
        }
        return table;
      };
    })();

    // ============================================
    // File Handling
    // ============================================

    const fileMap = new Map(); // path -> { file, data }

    const dropZone = document.getElementById('dropZone');
    const fileList = document.getElementById('fileList');
    const generateBtn = document.getElementById('generateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const platformSelect = document.getElementById('platformSelect');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const stats = document.getElementById('stats');

    // Drag and drop handlers
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', async (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');

      try {
        const items = e.dataTransfer.items;
        const entries = [];

        // Try webkitGetAsEntry for folder support
        if (items && items.length > 0 && items[0].webkitGetAsEntry) {
          for (const item of items) {
            if (item.kind === 'file') {
              const entry = item.webkitGetAsEntry();
              if (entry) entries.push(entry);
            }
          }

          for (const entry of entries) {
            await processEntry(entry, '');
          }
        } else {
          // Fallback: use files directly (no folder support)
          const files = e.dataTransfer.files;
          for (const file of files) {
            const data = await readFileAsArrayBuffer(file);
            fileMap.set(file.name, { file, data: new Uint8Array(data) });
          }
        }

        updateUI();
      } catch (err) {
        console.error('Drop error:', err);
        alert('Error processing dropped files: ' + err.message);
      }
    });

    // Process file/folder entries recursively
    async function processEntry(entry, path) {
      const fullPath = path ? `${path}/${entry.name}` : entry.name;

      if (entry.isFile) {
        const file = await new Promise((resolve, reject) => {
          entry.file(resolve, reject);
        });
        const data = await readFileAsArrayBuffer(file);
        fileMap.set(fullPath, { file, data: new Uint8Array(data) });
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        const entries = await new Promise((resolve, reject) => {
          const allEntries = [];
          const readBatch = () => {
            reader.readEntries((batch) => {
              if (batch.length === 0) {
                resolve(allEntries);
              } else {
                allEntries.push(...batch);
                readBatch();
              }
            }, reject);
          };
          readBatch();
        });

        for (const childEntry of entries) {
          await processEntry(childEntry, fullPath);
        }
      }
    }

    function readFileAsArrayBuffer(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function updateUI() {
      fileList.innerHTML = '';
      let totalSize = 0;

      const sortedPaths = [...fileMap.keys()].sort();
      for (const path of sortedPaths) {
        const { data } = fileMap.get(path);
        totalSize += data.length;

        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <span class="file-path">${escapeHtml(path)}</span>
          <span class="file-size">${formatSize(data.length)}</span>
        `;
        fileList.appendChild(item);
      }

      const hasFiles = fileMap.size > 0;
      generateBtn.disabled = !hasFiles;
      clearBtn.disabled = !hasFiles;

      stats.textContent = hasFiles
        ? `${fileMap.size} file(s), ${formatSize(totalSize)} total`
        : '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    clearBtn.addEventListener('click', () => {
      fileMap.clear();
      updateUI();
    });

    // ============================================
    // Archive Generation
    // ============================================

    generateBtn.addEventListener('click', async () => {
      generateBtn.disabled = true;
      clearBtn.disabled = true;
      progressContainer.classList.add('active');

      try {
        const platform = platformSelect.value;

        if (platform === 'zip') {
          const { zipData, originalSize, compressedSize } = await generateZipFile();
          downloadZip(zipData);

          const ratio = ((1 - compressedSize / originalSize) * 100).toFixed(1);
          stats.innerHTML = `${fileMap.size} file(s), ${formatSize(originalSize)} total<br>` +
            `Compressed: ${formatSize(compressedSize)} (${ratio}% smaller)<br>` +
            `Archive size: ${formatSize(zipData.length)}`;
        } else {
          const { script, originalSize, compressedSize } = await generateScript();
          downloadScript(script, platform);

          const ratio = ((1 - compressedSize / originalSize) * 100).toFixed(1);
          const scriptSize = new Blob([script]).size;
          stats.innerHTML = `${fileMap.size} file(s), ${formatSize(originalSize)} total<br>` +
            `Compressed: ${formatSize(compressedSize)} (${ratio}% smaller)<br>` +
            `Archive size: ${formatSize(scriptSize)}`;
        }
      } catch (err) {
        alert('Error generating archive: ' + err.message);
        console.error(err);
      } finally {
        generateBtn.disabled = false;
        clearBtn.disabled = false;
        progressContainer.classList.remove('active');
      }
    });

    async function generateScript() {
      const files = [...fileMap.entries()];
      let totalOriginalSize = 0;

      progressText.textContent = 'Building archive...';
      progressFill.style.width = '25%';
      await new Promise(r => setTimeout(r, 0));

      // Build solid archive: combine all files into one blob
      // Format: [fileCount:4][path1Len:4][path1][size1:4][data1][path2Len:4][path2][size2:4][data2]...
      const encoder = new TextEncoder();
      const chunks = [];
      const fileList = [];

      // Calculate total size for buffer
      let bufferSize = 4; // file count
      for (const [path, { data }] of files) {
        const pathBytes = encoder.encode(path);
        bufferSize += 4 + pathBytes.length + 4 + data.length;
        totalOriginalSize += data.length;
        fileList.push({ path, pathBytes, data });
      }

      // Build the archive blob
      const archive = new Uint8Array(bufferSize);
      const view = new DataView(archive.buffer);
      let offset = 0;

      // Write file count
      view.setUint32(offset, fileList.length, true);
      offset += 4;

      // Write each file
      for (const { path, pathBytes, data } of fileList) {
        // Path length + path
        view.setUint32(offset, pathBytes.length, true);
        offset += 4;
        archive.set(pathBytes, offset);
        offset += pathBytes.length;

        // Data length + data
        view.setUint32(offset, data.length, true);
        offset += 4;
        archive.set(data, offset);
        offset += data.length;
      }

      progressText.textContent = 'Compressing (solid)...';
      progressFill.style.width = '50%';
      await new Promise(r => setTimeout(r, 0));

      // Compress the entire archive as one unit (solid compression)
      const compressed = gzipCompress(archive);
      const base64 = arrayBufferToBase64(compressed);

      progressFill.style.width = '100%';
      progressText.textContent = 'Generating script...';

      // Generate script based on platform
      const platform = platformSelect.value;
      let script;
      if (platform === 'windows') {
        script = generatePowerShellScript(base64, fileList.length);
      } else if (platform === 'linux') {
        script = generateLinuxScript(base64, fileList.length);
      } else {
        script = generateBashScript(base64, fileList.length);
      }
      return { script, originalSize: totalOriginalSize, compressedSize: compressed.length, platform };
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = buffer instanceof Uint8Array ? buffer : new Uint8Array(buffer);
      const chunkSize = 8192;

      for (let i = 0; i < bytes.length; i += chunkSize) {
        const chunk = bytes.subarray(i, Math.min(i + chunkSize, bytes.length));
        binary += String.fromCharCode.apply(null, chunk);
      }

      return btoa(binary);
    }

    function escapeBashString(str) {
      // Escape special characters for bash
      return str.replace(/'/g, "'\\''");
    }

    function generateBashScript(base64Data, fileCount) {
      const heredocMarker = 'ARCHIVE_DATA_' + Date.now();

      // Split base64 into chunks for readability
      const chunks = [];
      for (let i = 0; i < base64Data.length; i += 76) {
        chunks.push(base64Data.substring(i, i + 76));
      }

      let script = `#!/bin/bash
# Self-extracting archive generated on ${new Date().toISOString()}
# Contains ${fileCount} file(s) - Solid compression
set -e

SCRIPT_DIR="$(cd "$(dirname "\$0")" && pwd)"
TIMESTAMP=$(date +%Y%m%d_%H%M%S)
EXTRACT_DIR="\$SCRIPT_DIR/extracted_\$TIMESTAMP"

echo "Self-Extracting Archive"
echo "======================"
echo "Extracting ${fileCount} file(s) to: \$EXTRACT_DIR"
echo ""

mkdir -p "\$EXTRACT_DIR"

# Decode and decompress the solid archive
ARCHIVE_FILE=$(mktemp)
base64 -D << '${heredocMarker}' | gunzip > "\$ARCHIVE_FILE"
${chunks.join('\n')}
${heredocMarker}

# Read 4-byte little-endian integer from archive
read_uint32() {
  local b0 b1 b2 b3
  b0=$(od -An -tu1 -N1 -j"\$1" "\$ARCHIVE_FILE" | tr -d ' ')
  b1=$(od -An -tu1 -N1 -j"\$((\$1+1))" "\$ARCHIVE_FILE" | tr -d ' ')
  b2=$(od -An -tu1 -N1 -j"\$((\$1+2))" "\$ARCHIVE_FILE" | tr -d ' ')
  b3=$(od -An -tu1 -N1 -j"\$((\$1+3))" "\$ARCHIVE_FILE" | tr -d ' ')
  echo "\$(( b0 + (b1 << 8) + (b2 << 16) + (b3 << 24) ))"
}

# Parse and extract files from solid archive
OFFSET=0
FILE_COUNT=$(read_uint32 \$OFFSET)
OFFSET=4

for ((i=0; i<FILE_COUNT; i++)); do
  # Read path length and path
  PATH_LEN=$(read_uint32 \$OFFSET)
  OFFSET=\$((OFFSET + 4))
  FILE_PATH=$(dd if="\$ARCHIVE_FILE" bs=1 skip=\$OFFSET count=\$PATH_LEN 2>/dev/null)
  OFFSET=\$((OFFSET + PATH_LEN))

  # Read data length
  DATA_LEN=$(read_uint32 \$OFFSET)
  OFFSET=\$((OFFSET + 4))

  # Create directory if needed
  DIR_PATH=$(dirname "\$FILE_PATH")
  if [ "\$DIR_PATH" != "." ]; then
    mkdir -p "\$EXTRACT_DIR/\$DIR_PATH"
  fi

  # Extract file data
  dd if="\$ARCHIVE_FILE" bs=1 skip=\$OFFSET count=\$DATA_LEN of="\$EXTRACT_DIR/\$FILE_PATH" 2>/dev/null
  OFFSET=\$((OFFSET + DATA_LEN))

  echo "  Extracted: \$FILE_PATH"
done

# Cleanup
rm -f "\$ARCHIVE_FILE"

echo ""
echo "Extraction complete!"
echo "Files extracted to: \$EXTRACT_DIR"
echo ""

# Open the extracted folder in Finder
open "\$EXTRACT_DIR"
`;

      return script;
    }

    function generateLinuxScript(base64Data, fileCount) {
      const heredocMarker = 'ARCHIVE_DATA_' + Date.now();

      // Split base64 into chunks for readability
      const chunks = [];
      for (let i = 0; i < base64Data.length; i += 76) {
        chunks.push(base64Data.substring(i, i + 76));
      }

      let script = `#!/bin/bash
# Self-extracting archive generated on ${new Date().toISOString()}
# Contains ${fileCount} file(s) - Solid compression
# Run: chmod +x archive.sh && ./archive.sh
set -e

SCRIPT_DIR="$(cd "$(dirname "\$0")" && pwd)"
TIMESTAMP=$(date +%Y%m%d_%H%M%S)
EXTRACT_DIR="\$SCRIPT_DIR/extracted_\$TIMESTAMP"

echo "Self-Extracting Archive"
echo "======================"
echo "Extracting ${fileCount} file(s) to: \$EXTRACT_DIR"
echo ""

mkdir -p "\$EXTRACT_DIR"

# Decode and decompress the solid archive
ARCHIVE_FILE=$(mktemp)
base64 -d << '${heredocMarker}' | gunzip > "\$ARCHIVE_FILE"
${chunks.join('\n')}
${heredocMarker}

# Read 4-byte little-endian integer from archive
read_uint32() {
  local b0 b1 b2 b3
  b0=$(od -An -tu1 -N1 -j"\$1" "\$ARCHIVE_FILE" | tr -d ' ')
  b1=$(od -An -tu1 -N1 -j"\$((\$1+1))" "\$ARCHIVE_FILE" | tr -d ' ')
  b2=$(od -An -tu1 -N1 -j"\$((\$1+2))" "\$ARCHIVE_FILE" | tr -d ' ')
  b3=$(od -An -tu1 -N1 -j"\$((\$1+3))" "\$ARCHIVE_FILE" | tr -d ' ')
  echo "\$(( b0 + (b1 << 8) + (b2 << 16) + (b3 << 24) ))"
}

# Parse and extract files from solid archive
OFFSET=0
FILE_COUNT=$(read_uint32 \$OFFSET)
OFFSET=4

for ((i=0; i<FILE_COUNT; i++)); do
  # Read path length and path
  PATH_LEN=$(read_uint32 \$OFFSET)
  OFFSET=\$((OFFSET + 4))
  FILE_PATH=$(dd if="\$ARCHIVE_FILE" bs=1 skip=\$OFFSET count=\$PATH_LEN 2>/dev/null)
  OFFSET=\$((OFFSET + PATH_LEN))

  # Read data length
  DATA_LEN=$(read_uint32 \$OFFSET)
  OFFSET=\$((OFFSET + 4))

  # Create directory if needed
  DIR_PATH=$(dirname "\$FILE_PATH")
  if [ "\$DIR_PATH" != "." ]; then
    mkdir -p "\$EXTRACT_DIR/\$DIR_PATH"
  fi

  # Extract file data
  dd if="\$ARCHIVE_FILE" bs=1 skip=\$OFFSET count=\$DATA_LEN of="\$EXTRACT_DIR/\$FILE_PATH" 2>/dev/null
  OFFSET=\$((OFFSET + DATA_LEN))

  echo "  Extracted: \$FILE_PATH"
done

# Cleanup
rm -f "\$ARCHIVE_FILE"

echo ""
echo "Extraction complete!"
echo "Files extracted to: \$EXTRACT_DIR"
echo ""

# Try to open file manager (works on most Linux desktops)
if command -v xdg-open &> /dev/null; then
  xdg-open "\$EXTRACT_DIR"
elif command -v nautilus &> /dev/null; then
  nautilus "\$EXTRACT_DIR"
fi
`;

      return script;
    }

    function downloadScript(script, platform) {
      const mimeType = platform === 'windows' ? 'application/x-powershell' : 'application/x-sh';
      const extensions = { windows: 'ps1', linux: 'sh', mac: 'command' };
      const extension = extensions[platform] || 'sh';

      const blob = new Blob([script], { type: mimeType });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `archive_${Date.now()}.${extension}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function generatePowerShellScript(base64Data, fileCount) {
      // Split base64 into chunks for readability
      const chunks = [];
      for (let i = 0; i < base64Data.length; i += 76) {
        chunks.push(base64Data.substring(i, i + 76));
      }

      let script = `# Self-extracting archive generated on ${new Date().toISOString()}
# Contains ${fileCount} file(s) - Solid compression
# Right-click and "Run with PowerShell" or run: powershell -ExecutionPolicy Bypass -File <filename>.ps1

$ErrorActionPreference = "Stop"

$ScriptDir = Split-Path -Parent $MyInvocation.MyCommand.Path
$Timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
$ExtractDir = Join-Path $ScriptDir "extracted_$Timestamp"

Write-Host "Self-Extracting Archive"
Write-Host "======================"
Write-Host "Extracting ${fileCount} file(s) to: $ExtractDir"
Write-Host ""

New-Item -ItemType Directory -Path $ExtractDir -Force | Out-Null

# Embedded base64 gzip data
$base64Data = @"
${chunks.join('\n')}
"@

# Decode and decompress
$compressedBytes = [Convert]::FromBase64String($base64Data)
$inputStream = New-Object System.IO.MemoryStream(,$compressedBytes)
$gzipStream = New-Object System.IO.Compression.GzipStream($inputStream, [System.IO.Compression.CompressionMode]::Decompress)
$outputStream = New-Object System.IO.MemoryStream

$buffer = New-Object byte[](4096)
while (($read = $gzipStream.Read($buffer, 0, $buffer.Length)) -gt 0) {
    $outputStream.Write($buffer, 0, $read)
}

$gzipStream.Close()
$inputStream.Close()

$archiveData = $outputStream.ToArray()
$outputStream.Close()

# Parse the archive format
$offset = 0

# Read file count (4 bytes, little-endian)
$fileCount = [BitConverter]::ToUInt32($archiveData, $offset)
$offset += 4

for ($i = 0; $i -lt $fileCount; $i++) {
    # Read path length
    $pathLen = [BitConverter]::ToUInt32($archiveData, $offset)
    $offset += 4

    # Read path
    $filePath = [System.Text.Encoding]::UTF8.GetString($archiveData, $offset, $pathLen)
    $offset += $pathLen

    # Read data length
    $dataLen = [BitConverter]::ToUInt32($archiveData, $offset)
    $offset += 4

    # Create directory if needed
    $fullPath = Join-Path $ExtractDir $filePath
    $dirPath = Split-Path -Parent $fullPath
    if ($dirPath -and !(Test-Path $dirPath)) {
        New-Item -ItemType Directory -Path $dirPath -Force | Out-Null
    }

    # Extract file data
    $fileData = New-Object byte[]($dataLen)
    [Array]::Copy($archiveData, $offset, $fileData, 0, $dataLen)
    [System.IO.File]::WriteAllBytes($fullPath, $fileData)
    $offset += $dataLen

    Write-Host "  Extracted: $filePath"
}

Write-Host ""
Write-Host "Extraction complete!"
Write-Host "Files extracted to: $ExtractDir"
Write-Host ""

# Open the extracted folder in Explorer
Start-Process explorer.exe -ArgumentList $ExtractDir
`;

      return script;
    }

    // ============================================
    // ZIP File Generation
    // ============================================

    async function generateZipFile() {
      const files = [...fileMap.entries()];
      let totalOriginalSize = 0;
      let totalCompressedSize = 0;

      progressText.textContent = 'Creating ZIP...';
      progressFill.style.width = '0%';
      await new Promise(r => setTimeout(r, 0));

      const encoder = new TextEncoder();
      const localHeaders = [];
      const centralHeaders = [];
      let offset = 0;

      // Process each file
      for (let i = 0; i < files.length; i++) {
        const [path, { data }] = files[i];
        progressText.textContent = `Compressing: ${path}`;
        progressFill.style.width = `${(i / files.length) * 80}%`;
        await new Promise(r => setTimeout(r, 0));

        totalOriginalSize += data.length;

        // Compress with DEFLATE (raw, no gzip wrapper)
        const compressed = Deflate.compress(data);
        totalCompressedSize += compressed.length;

        const pathBytes = encoder.encode(path.replace(/\//g, '\\'));
        const crc = crc32(data);
        const now = new Date();

        // DOS date/time format
        const dosTime = (now.getHours() << 11) | (now.getMinutes() << 5) | (now.getSeconds() >> 1);
        const dosDate = ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();

        // Local file header
        const localHeader = new Uint8Array(30 + pathBytes.length);
        const localView = new DataView(localHeader.buffer);
        localView.setUint32(0, 0x04034b50, true);  // Local file header signature
        localView.setUint16(4, 20, true);          // Version needed (2.0)
        localView.setUint16(6, 0, true);           // General purpose flag
        localView.setUint16(8, 8, true);           // Compression method (DEFLATE)
        localView.setUint16(10, dosTime, true);    // Last mod time
        localView.setUint16(12, dosDate, true);    // Last mod date
        localView.setUint32(14, crc, true);        // CRC-32
        localView.setUint32(18, compressed.length, true); // Compressed size
        localView.setUint32(22, data.length, true);       // Uncompressed size
        localView.setUint16(26, pathBytes.length, true);  // File name length
        localView.setUint16(28, 0, true);          // Extra field length
        localHeader.set(pathBytes, 30);

        localHeaders.push({ header: localHeader, data: compressed, offset });

        // Central directory header
        const centralHeader = new Uint8Array(46 + pathBytes.length);
        const centralView = new DataView(centralHeader.buffer);
        centralView.setUint32(0, 0x02014b50, true);  // Central directory signature
        centralView.setUint16(4, 20, true);          // Version made by
        centralView.setUint16(6, 20, true);          // Version needed
        centralView.setUint16(8, 0, true);           // General purpose flag
        centralView.setUint16(10, 8, true);          // Compression method
        centralView.setUint16(12, dosTime, true);    // Last mod time
        centralView.setUint16(14, dosDate, true);    // Last mod date
        centralView.setUint32(16, crc, true);        // CRC-32
        centralView.setUint32(20, compressed.length, true); // Compressed size
        centralView.setUint32(24, data.length, true);       // Uncompressed size
        centralView.setUint16(28, pathBytes.length, true);  // File name length
        centralView.setUint16(30, 0, true);          // Extra field length
        centralView.setUint16(32, 0, true);          // File comment length
        centralView.setUint16(34, 0, true);          // Disk number start
        centralView.setUint16(36, 0, true);          // Internal file attributes
        centralView.setUint32(38, 0, true);          // External file attributes
        centralView.setUint32(42, offset, true);     // Relative offset of local header
        centralHeader.set(pathBytes, 46);

        centralHeaders.push(centralHeader);

        offset += localHeader.length + compressed.length;
      }

      progressFill.style.width = '90%';
      progressText.textContent = 'Finalizing ZIP...';
      await new Promise(r => setTimeout(r, 0));

      // Calculate central directory size
      const centralDirOffset = offset;
      let centralDirSize = 0;
      for (const header of centralHeaders) {
        centralDirSize += header.length;
      }

      // End of central directory
      const eocd = new Uint8Array(22);
      const eocdView = new DataView(eocd.buffer);
      eocdView.setUint32(0, 0x06054b50, true);    // EOCD signature
      eocdView.setUint16(4, 0, true);              // Disk number
      eocdView.setUint16(6, 0, true);              // Disk with central directory
      eocdView.setUint16(8, files.length, true);   // Number of entries on disk
      eocdView.setUint16(10, files.length, true);  // Total number of entries
      eocdView.setUint32(12, centralDirSize, true);// Central directory size
      eocdView.setUint32(16, centralDirOffset, true); // Central directory offset
      eocdView.setUint16(20, 0, true);             // Comment length

      // Combine all parts
      const totalSize = offset + centralDirSize + 22;
      const zipData = new Uint8Array(totalSize);
      let pos = 0;

      // Write local headers and file data
      for (const { header, data } of localHeaders) {
        zipData.set(header, pos);
        pos += header.length;
        zipData.set(data, pos);
        pos += data.length;
      }

      // Write central directory
      for (const header of centralHeaders) {
        zipData.set(header, pos);
        pos += header.length;
      }

      // Write EOCD
      zipData.set(eocd, pos);

      progressFill.style.width = '100%';

      return { zipData, originalSize: totalOriginalSize, compressedSize: totalCompressedSize };
    }

    function downloadZip(zipData) {
      const blob = new Blob([zipData], { type: 'application/zip' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = `archive_${Date.now()}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
